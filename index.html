<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЗС Екатеринбург</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        #map { height: calc(100vh - 60px); width: 100%; }
        body {
            color: var(--tg-theme-text-color, #222222);
            background-color: var(--tg-theme-bg-color, #ffffff);
        }
    </style>
</head>
<body class="p-0 m-0 overflow-hidden font-sans select-none">
    <div id="app" class="flex flex-col h-screen">
        <header class="flex items-center justify-between px-4 h-[60px] bg-slate-900 text-white shadow-md z-[1000]">
            <div>
                <h1 class="text-base font-bold leading-tight">АЗС Екатеринбург</h1>
                <p class="text-[10px] text-slate-400">Интерактивный мониторинг станций</p>
            </div>
            <span class="text-xs bg-emerald-600 px-2 py-1 rounded-full font-medium">
                {{ arrStations.length }} АЗС
            </span>
        </header>

        <div id="map" class="flex-grow"></div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                // Статический массив АЗС Екатеринбурга (координаты и доступное топливо)
                const arrStations = ref([
                    { id: 1, name: 'Газпромнефть №102', lat: 56.8361, lng: 60.6508, address: 'ул. Малышева, 143', fuel: ['АИ-92', 'АИ-95', 'G-Drive 95', 'ДТ'] },
                    { id: 2, name: 'Лукойл №66', lat: 56.8573, lng: 60.6033, address: 'ул. Челюскинцев, 110', fuel: ['АИ-92', 'АИ-95', 'Экто 100', 'ДТ'] },
                    { id: 3, name: 'Башнефть №12', lat: 56.8123, lng: 60.5983, address: 'ул. Фурманова, 105', fuel: ['АИ-92', 'АИ-95', 'ATUM 95'] },
                    { id: 4, name: 'Газпромнефть №115', lat: 56.8012, lng: 60.6154, address: 'ул. Машинная, 37', fuel: ['АИ-92', 'АИ-95', 'G-Drive 100', 'ДТ'] }
                ]);

                let objMap = null;

                onMounted(() => {
                    // Инициализация Telegram WebApp API
                    if (window.Telegram && window.Telegram.WebApp) {
                        const objTg = window.Telegram.WebApp;
                        objTg.ready();
                        objTg.expand(); // Разворачиваем приложение на весь экран телефона
                    }

                    // Базовое центрирование карты на Екатеринбург
                    objMap = L.map('map', {
                        zoomControl: false
                    }).setView([56.8389, 60.6057], 12);

                    // Добавление кнопок масштаба в правый нижний угол
                    L.control.zoom({ position: 'bottomright' }).addTo(objMap);

                    // Подключение слоя тайлов OpenStreetMap
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap'
                    }).addTo(objMap);

                    // Инициализация маркеров на карте
                    arrStations.value.forEach(objStation => {
                        const strFuelBadges = objStation.fuel.map(strFuel =>
                            `<span class="bg-blue-100 text-blue-800 text-[10px] font-semibold px-2 py-0.5 rounded m-0.5 inline-block">${strFuel}</span>`
                        ).join('');

                        const strPopupContent = `
                            <div class="p-1 font-sans text-slate-900">
                                <b class="text-sm font-bold block mb-1">${objStation.name}</b>
                                <span class="text-xs text-gray-500 block mb-2">${objStation.address}</span>
                                <div class="flex flex-wrap max-w-[200px]">${strFuelBadges}</div>
                            </div>
                        `;

                        L.marker([objStation.lat, objStation.lng])
                            .addTo(objMap)
                            .bindPopup(strPopupContent);
                    });
                });

                return {
                    arrStations
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
