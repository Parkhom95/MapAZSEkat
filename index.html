<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АЗС Екатеринбург — 2GIS</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Vue 3 CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- Подключение карт 2GIS API v2.0 -->
    <!-- Для коммерческих проектов или во избежание лимитов допишите в конец ссылки: &key=ВАШ_КЛЮЧ -->
    <script src="https://maps.api.2gis.ru/2.0/loader.js?pkg=basic"></script>

    <style>
        #map { height: calc(100vh - 60px); width: 100%; background-color: #f1f5f9; }
        body {
            color: var(--tg-theme-text-color, #222222);
            background-color: var(--tg-theme-bg-color, #ffffff);
        }
        /* Корректировка стилей попапа 2GIS, чтобы они выглядели аккуратно */
        .dg-popup-content { padding: 4px !important; }
    </style>
</head>
<body class="p-0 m-0 overflow-hidden font-sans select-none">
    <div id="app" class="flex flex-col h-screen">
        <!-- Верхняя панель -->
        <header class="flex items-center justify-between px-4 h-[60px] bg-slate-900 text-white shadow-md z-[1000]">
            <div>
                <h1 class="text-base font-bold leading-tight">АЗС Екатеринбург</h1>
                <p class="text-[10px] text-emerald-400">Карта на движке 2GIS</p>
            </div>
            <span class="text-xs bg-emerald-600 px-2 py-1 rounded-full font-medium">
                {{ arrStations.length }} станций
            </span>
        </header>

        <!-- Контейнер карты -->
        <div id="map"></div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                // База координат АЗС Екатеринбурга
                const arrStations = ref([
                    // Газпромнефть
                    { id: 1, name: 'Газпромнефть №102', lat: 56.836152, lng: 60.650821, address: 'ул. Малышева, 143', fuel: ['АИ-92', 'АИ-95', 'G-95', 'ДТ'] },
                    { id: 2, name: 'Газпромнефть №115', lat: 56.801231, lng: 60.615412, address: 'ул. Машинная, 37', fuel: ['АИ-92', 'АИ-95', 'G-100', 'ДТ'] },
                    { id: 3, name: 'Газпромнефть №106', lat: 56.873210, lng: 60.610444, address: 'ул. Космонавтов, 11Б', fuel: ['АИ-92', 'АИ-95', 'ДТ'] },
                    { id: 4, name: 'Газпромнефть №132', lat: 56.828551, lng: 60.551023, address: 'ул. Серафимы Дерябиной, 41', fuel: ['АИ-92', 'АИ-95', 'G-95'] },
                    { id: 5, name: 'Газпромнефть №109', lat: 56.852119, lng: 60.665123, address: 'ул. Комсомольская, 69', fuel: ['АИ-92', 'АИ-95', 'ДТ'] },

                    // Лукойл
                    { id: 6, name: 'Лукойл №66', lat: 56.857312, lng: 60.603345, address: 'ул. Челюскинцев, 110', fuel: ['АИ-92', 'АИ-95', 'Экто-100', 'ДТ'] },
                    { id: 7, name: 'Лукойл №74', lat: 56.799411, lng: 60.662102, address: 'ул. Базовый переулок, 10', fuel: ['АИ-92', 'АИ-95', 'ДТ'] },
                    { id: 8, name: 'Лукойл №12', lat: 56.821102, lng: 60.608774, address: 'ул. Белинского, 122', fuel: ['АИ-92', 'АИ-95', 'Экто-100'] },
                    { id: 9, name: 'Лукойл №83', lat: 56.840991, lng: 60.560121, address: 'ул. Токарей, 35', fuel: ['АИ-92', 'АИ-95', 'ДТ'] },

                    // Башнефть
                    { id: 10, name: 'Башнефть №12', lat: 56.812344, lng: 60.598311, address: 'ул. Фурманова, 105', fuel: ['АИ-92', 'АИ-95', 'ATUM-95'] },
                    { id: 11, name: 'Башнефть №15', lat: 56.861023, lng: 60.574412, address: 'ул. Халтурина, 42', fuel: ['АИ-92', 'АИ-95', 'ДТ'] },
                    { id: 12, name: 'Башнефть №45', lat: 56.831201, lng: 60.689451, address: 'ул. Дублер Сибирского тракта, 4', fuel: ['АИ-92', 'АИ-95'] },

                    // Татнефть
                    { id: 13, name: 'Татнефть №201', lat: 56.784512, lng: 60.621455, address: 'ул. Юлиуса Фучика, 2', fuel: ['АИ-92', 'АИ-95', 'Танеко ДТ'] },
                    { id: 14, name: 'Татнефть №205', lat: 56.859123, lng: 60.641201, address: 'ул. Данила Зверева, 21', fuel: ['АИ-92', 'АИ-95'] },
                    { id: 15, name: 'Татнефть №210', lat: 56.815412, lng: 60.534102, address: 'ул. Амундсена, 125', fuel: ['АИ-92', 'АИ-95', 'Танеко ДТ'] }
                ]);

                onMounted(() => {
                    // Сигнализируем Telegram Mini App о готовности
                    if (window.Telegram && window.Telegram.WebApp) {
                        window.Telegram.WebApp.ready();
                        window.Telegram.WebApp.expand();
                    }

                    // Ожидаем загрузку глобального объекта DG от 2GIS
                    DG.then(() => {
                        // Инициализируем карту (Центр — Екатеринбург)
                        const objMap = DG.map('map', {
                            center: [56.8389, 60.6057],
                            zoom: 12,
                            zoomControl: true,
                            fullscreenControl: false
                        });

                        // Перебираем массив АЗС и создаем маркеры
                        arrStations.value.forEach(objStation => {
                            // Формируем красивый HTML-вид списка топлива для попапа
                            const strFuelBadges = objStation.fuel.map(strFuel =>
                                `<span style="background-color: #eff6ff; color: #1e40af; font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin: 2px; display: inline-block; border: 1px solid #bfdbfe;">${strFuel}</span>`
                            ).join('');

                            const strPopupContent = `
                                <div style="font-family: sans-serif; color: #0f172a; padding: 4px; min-width: 180px;">
                                    <b style="font-size: 13px; display: block; margin-bottom: 2px; color: #0f172a;">${objStation.name}</b>
                                    <span style="font-size: 11px; color: #64748b; display: block; margin-bottom: 6px;">${objStation.address}</span>
                                    <div style="margin-left: -2px; margin-right: -2px;">${strFuelBadges}</div>
                                </div>
                            `;

                            // Добавляем маркер на карту 2GIS
                            DG.marker([objStation.lat, objStation.lng])
                                .addTo(objMap)
                                .bindPopup(strPopupContent);
                        });
                    });
                });

                return {
                    arrStations
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
